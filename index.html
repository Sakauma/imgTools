<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ratio Cropper</title>
    <link rel="stylesheet" href="./styles.css?v=20260422-6" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="control-panel">
        <div class="panel-hero">
          <div class="hero-top">
            <p class="eyebrow">Ratio Cropper</p>
            <span class="hero-pill">Local First</span>
          </div>
          <h1>把图像裁剪做成一件干净、直接的事</h1>
          <p class="intro">
            上传图片后选择比例，直接拖动裁剪框调整范围。最终下载保持原始像素，不压缩细节。
          </p>
          <p class="trust-note">所有处理都在当前浏览器完成，不会上传图片。</p>
        </div>

        <section class="control-group">
          <div class="group-head">
            <div>
              <p class="group-kicker">Source</p>
              <h2>图像来源</h2>
            </div>
          </div>

          <label class="field field-file">
            <span>选择图像</span>
            <input id="imageInput" type="file" accept="image/*" />
          </label>

          <button id="loadDemo" class="ghost-button" type="button">加载示例图</button>
        </section>

        <section class="control-group">
          <div class="group-head">
            <div>
              <p class="group-kicker">Crop</p>
              <h2>裁剪比例</h2>
            </div>
          </div>

          <div class="ratio-grid" aria-label="裁剪比例快捷选项">
            <button class="ratio-chip is-active" type="button" data-ratio-value="free">自由</button>
            <button class="ratio-chip" type="button" data-ratio-value="1:1">1:1</button>
            <button class="ratio-chip" type="button" data-ratio-value="4:3">4:3</button>
            <button class="ratio-chip" type="button" data-ratio-value="3:4">3:4</button>
            <button class="ratio-chip" type="button" data-ratio-value="16:9">16:9</button>
            <button class="ratio-chip" type="button" data-ratio-value="9:16">9:16</button>
            <button class="ratio-chip" type="button" data-ratio-value="21:9">21:9</button>
            <button class="ratio-chip" type="button" data-ratio-value="custom">自定义</button>
          </div>

          <select id="ratioPreset" hidden>
            <option value="free">自由裁剪</option>
            <option value="1:1">1 : 1</option>
            <option value="4:3">4 : 3</option>
            <option value="3:4">3 : 4</option>
            <option value="16:9">16 : 9</option>
            <option value="9:16">9 : 16</option>
            <option value="21:9">21 : 9</option>
            <option value="custom">自定义</option>
          </select>

          <div class="field-group" id="customRatioFields" hidden>
            <label class="field">
              <span>宽度比</span>
              <input id="customWidth" type="number" min="1" step="1" value="4" />
            </label>
            <label class="field">
              <span>高度比</span>
              <input id="customHeight" type="number" min="1" step="1" value="5" />
            </label>
          </div>
        </section>

        <section class="control-group">
          <div class="group-head">
            <div>
              <p class="group-kicker">Export</p>
              <h2>导出与重置</h2>
            </div>
          </div>

          <div class="field">
            <span>导出格式</span>
            <select id="exportFormat">
              <option value="image/png">PNG</option>
              <option value="image/jpeg">JPEG</option>
            </select>
          </div>

          <div class="button-row">
            <button id="resetCrop" class="ghost-button" type="button">重置裁剪框</button>
            <button id="centerCrop" class="ghost-button" type="button">重新居中</button>
          </div>

          <button id="downloadBtn" class="primary-button" type="button" disabled>
            下载裁剪结果
          </button>
        </section>

        <dl class="stats-card">
          <div class="stat-tile">
            <dt>原图尺寸</dt>
            <dd id="imageMeta">未加载</dd>
          </div>
          <div class="stat-tile">
            <dt>裁剪区域</dt>
            <dd id="cropMeta">未选择</dd>
          </div>
          <div class="stat-tile stat-wide">
            <dt>当前比例</dt>
            <dd id="ratioMeta">自由裁剪</dd>
          </div>
        </dl>
      </aside>

      <main class="workspace">
        <section class="preview-card">
          <div class="section-head">
            <div>
              <p class="section-kicker">Canvas</p>
              <h2>交互式裁剪画布</h2>
            </div>
            <span class="section-pill">拖动框体，缩放四角</span>
          </div>

          <div id="viewport" class="viewport">
            <div id="emptyState" class="empty-state">
              <p>选择图片，或直接把图片拖到这个区域，这里会显示可裁剪预览。</p>
            </div>
            <div id="stage" class="stage" hidden>
              <img id="imagePreview" alt="待裁剪图片预览" />
              <div class="crop-shade crop-shade-top" aria-hidden="true"></div>
              <div class="crop-shade crop-shade-right" aria-hidden="true"></div>
              <div class="crop-shade crop-shade-bottom" aria-hidden="true"></div>
              <div class="crop-shade crop-shade-left" aria-hidden="true"></div>
              <div id="cropBox" class="crop-box" tabindex="0" aria-label="裁剪框">
                <span class="handle handle-nw" data-handle="nw"></span>
                <span class="handle handle-ne" data-handle="ne"></span>
                <span class="handle handle-sw" data-handle="sw"></span>
                <span class="handle handle-se" data-handle="se"></span>
                <span class="rule-of-thirds vertical one"></span>
                <span class="rule-of-thirds vertical two"></span>
                <span class="rule-of-thirds horizontal one"></span>
                <span class="rule-of-thirds horizontal two"></span>
              </div>
            </div>
          </div>
        </section>

        <section class="result-card">
          <div class="section-head">
            <div>
              <p class="section-kicker">Result</p>
              <h2>导出预览</h2>
            </div>
            <span class="section-pill section-pill-muted">下载保持原图清晰度</span>
          </div>
          <p class="result-note">这里显示当前裁剪范围的缩略预览，方便你在导出前确认构图。</p>
          <div class="result-frame">
            <canvas id="resultCanvas"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js?v=20260422-6"></script>
  </body>
</html>
