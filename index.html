<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ratio Cropper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="control-panel">
        <p class="eyebrow">Image Crop Tool</p>
        <h1>按比例可视化裁剪图像</h1>
        <p class="intro">
          上传图片后，选择预设比例或自定义宽高比。拖动裁剪框移动位置，拖四角调整范围。
        </p>

        <label class="field">
          <span>选择图像</span>
          <input id="imageInput" type="file" accept="image/*" />
        </label>

        <div class="field">
          <span>裁剪比例</span>
          <select id="ratioPreset">
            <option value="free">自由裁剪</option>
            <option value="1:1">1 : 1</option>
            <option value="4:3">4 : 3</option>
            <option value="3:4">3 : 4</option>
            <option value="16:9">16 : 9</option>
            <option value="9:16">9 : 16</option>
            <option value="21:9">21 : 9</option>
            <option value="custom">自定义</option>
          </select>
        </div>

        <div class="field-group" id="customRatioFields" hidden>
          <label class="field">
            <span>宽度比</span>
            <input id="customWidth" type="number" min="1" step="1" value="4" />
          </label>
          <label class="field">
            <span>高度比</span>
            <input id="customHeight" type="number" min="1" step="1" value="5" />
          </label>
        </div>

        <div class="field">
          <span>导出格式</span>
          <select id="exportFormat">
            <option value="image/png">PNG</option>
            <option value="image/jpeg">JPEG</option>
          </select>
        </div>

        <div class="button-row">
          <button id="loadDemo" type="button">加载示例图</button>
          <button id="resetCrop" type="button">重置裁剪框</button>
        </div>
        <button id="centerCrop" type="button">重新居中</button>

        <button id="downloadBtn" class="primary-button" type="button" disabled>
          下载裁剪结果
        </button>

        <dl class="stats-card">
          <div>
            <dt>原图尺寸</dt>
            <dd id="imageMeta">未加载</dd>
          </div>
          <div>
            <dt>裁剪区域</dt>
            <dd id="cropMeta">未选择</dd>
          </div>
          <div>
            <dt>当前比例</dt>
            <dd id="ratioMeta">自由裁剪</dd>
          </div>
        </dl>
      </aside>

      <main class="workspace">
        <section class="preview-card">
          <div class="section-head">
            <div>
              <p class="section-kicker">Preview</p>
              <h2>交互式裁剪区</h2>
            </div>
            <p class="hint">拖动裁剪框内部可移动，拖四角可缩放</p>
          </div>

          <div id="viewport" class="viewport">
            <div id="emptyState" class="empty-state">
              <p>选择图片，或直接把图片拖到这个区域，这里会显示可裁剪预览。</p>
            </div>
            <div id="stage" class="stage" hidden>
              <img id="imagePreview" alt="待裁剪图片预览" />
              <div id="cropBox" class="crop-box" tabindex="0" aria-label="裁剪框">
                <span class="handle handle-nw" data-handle="nw"></span>
                <span class="handle handle-ne" data-handle="ne"></span>
                <span class="handle handle-sw" data-handle="sw"></span>
                <span class="handle handle-se" data-handle="se"></span>
                <span class="rule-of-thirds vertical one"></span>
                <span class="rule-of-thirds vertical two"></span>
                <span class="rule-of-thirds horizontal one"></span>
                <span class="rule-of-thirds horizontal two"></span>
              </div>
            </div>
          </div>
        </section>

        <section class="result-card">
          <div class="section-head">
            <div>
              <p class="section-kicker">Result</p>
              <h2>裁剪结果预览</h2>
            </div>
          </div>
          <div class="result-frame">
            <canvas id="resultCanvas"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
