name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f styles.css
          test -d styles
          test -f package.json
          test -f src/main.js
          test -f README.md
          test -f demo.svg
          test -f playwright.config.js
          test -f playwright.perf.config.js
          test -f scripts/serve-static.mjs
          test -f src/lib/layers.js
          test -f src/lib/effects.js
          test -f src/lib/presets.js
          test -f tests/layers.test.js
          test -f tests/effects.test.js
          test -f tests/presets.test.js
          test -f tests/ui/workbench.spec.js
          test -f tests/ui/mobile.spec.js
          test -f tests/ui/visual.spec.js
          test -f tests/perf/workbench.perf.spec.js

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UI functional tests
        run: npm run test:ui:functional

      - name: Run performance smoke tests
        run: npm run test:perf

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html dist/
          cp styles.css dist/
          cp -R styles dist/
          cp demo.svg dist/
          cp -R src dist/
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
