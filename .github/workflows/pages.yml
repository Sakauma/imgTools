name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate project files
        shell: bash
        run: |
          set -euo pipefail
          node --check script.js
          test -f index.html
          test -f styles.css
          test -f script.js
          test -f demo.svg

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html dist/
          cp styles.css dist/
          cp script.js dist/
          cp demo.svg dist/

      - name: Configure GitHub Pages
        if: ${{ secrets.PAGES_DEPLOY_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Enable and configure GitHub Pages
        if: ${{ secrets.PAGES_DEPLOY_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
