name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f styles.css
          test -f package.json
          test -f src/main.js
          test -f README.md
          test -f demo.svg

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test
